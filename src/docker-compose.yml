services:
  postgres:
    image: postgres:16
    container_name: flayer-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flayer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flayer}
      POSTGRES_DB: ${POSTGRES_DB:-flayer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flayer -d flayer"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres_test:
    image: postgres:16
    container_name: flayer-db-test
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-flayer_test}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flayer_test"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: flayer-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    container_name: flayer-mailpit
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    restart: unless-stopped

volumes:
  pgdata:

